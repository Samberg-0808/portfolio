<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..700,0..100,0..1;1,9..144,300..700,0..100,0..1&display=swap" rel="stylesheet" />
<style>
:root {
  --ink: #1b2240;
  --ink-2: #2f3a5f;
  --muted: #5f6a87;
  --muted-2: #8a93ad;
  --hair: rgba(18, 28, 70, 0.08);
  --hair-2: rgba(18, 28, 70, 0.14);
  --accent: oklch(0.55 0.15 240);
  --accent-2: oklch(0.68 0.12 220);
  --accent-3: oklch(0.72 0.13 280);
  --paper: #eef1f8;
  --radius: 28px;
  --glass-white: rgba(255, 255, 255, 0.22);
  --glass-white-soft: rgba(255, 255, 255, 0.14);
  --shadow-sm: 0 1px 2px rgba(30,40,90,.06), 0 4px 16px rgba(30,40,90,.06);
  --shadow-md: 0 10px 30px rgba(40, 60, 130, 0.12), 0 2px 6px rgba(40, 60, 130, 0.06);
  --shadow-lg: 0 24px 60px rgba(40, 60, 130, 0.20), 0 6px 18px rgba(40, 60, 130, 0.10);
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  --font-display: "Fraunces", "Cormorant Garamond", Georgia, serif;
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  font-family: var(--font-sans);
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "cv11", "ss01", "ss03";
  overflow-x: hidden;
}

/* ============ BACKGROUND — ANIMATED CANVAS ============ */
.bg-root { display: none; }
.bg-grid { display: none; }
.orb { display: none; }
.orb-f { display: none; }
.bg-noise { display: none; }
@keyframes drift {}


/* ============ GLASS PRIMITIVES ============ */
.glass-surface {
  position: relative;
  background: var(--glass-white);
  border: 0.5px solid rgba(255, 255, 255, 0.55);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.7) inset,
    0 -1px 0 rgba(255,255,255,0.25) inset,
    var(--shadow-md);
  isolation: isolate;
  overflow: hidden;
  transition: box-shadow 0.3s cubic-bezier(.2,.7,.2,1), transform 0.3s cubic-bezier(.2,.7,.2,1);
}
/* painterly halo behind every glass surface */
.glass-surface::before {
  content: "";
  position: absolute;
  inset: -30px;
  background:
    radial-gradient(60% 80% at 20% 20%, rgba(232,200,160,0.35), transparent 60%),
    radial-gradient(60% 80% at 80% 80%, rgba(160,180,220,0.35), transparent 60%);
  filter: blur(26px);
  z-index: -1;
  opacity: 0.6;
  pointer-events: none;
}
.glass-surface .glass-edge {
  position: absolute; inset: 0; pointer-events: none;
  border: 1px solid transparent;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0) 35%, rgba(255,255,255,0) 65%, rgba(255,255,255,0.5)) border-box;
  -webkit-mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  opacity: 0.9;
}
.glass-surface .glass-spec {
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(120% 60% at 30% 0%, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 45%),
    radial-gradient(80% 40% at 80% 100%, rgba(180,200,255,0.22) 0%, rgba(180,200,255,0) 60%);
  mix-blend-mode: screen;
}
.glass-surface .glass-tint {
  position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.01) 40%, rgba(255,255,255,0.04));
}
.glass-surface .glass-content {
  position: relative; z-index: 1; display: block;
}

/* When the glass surface needs to lay out its children in a grid/flex,
   apply it to the .glass-content wrapper (since the decorative spans are also direct children). */
.hero > .glass-content {
  display: grid;
  grid-template-columns: 1fr 260px;
  gap: 32px;
  align-items: center;
  width: 100%;
}
.project-card > .glass-content {
  display: grid;
  grid-template-columns: 1.15fr 1fr;
  width: 100%;
}
.nav > .glass-content {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  width: 100%;
}
.detail > .glass-content { display: block; width: 100%; }

/* Pill button */
.glass-pill {
  position: relative;
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 16px;
  border-radius: 999px;
  background: rgba(255,255,255,0.22);
  backdrop-filter: blur(18px) saturate(1.6);
  -webkit-backdrop-filter: blur(18px) saturate(1.6);
  border: 0.5px solid rgba(255,255,255,0.6);
  box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset, var(--shadow-sm);
  color: var(--ink);
  font: 500 13px/1 var(--font-sans);
  letter-spacing: -0.01em;
  cursor: pointer;
  isolation: isolate;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.glass-pill .glass-content {
  position: relative; z-index: 1;
  display: inline-flex; align-items: center; gap: 8px;
}
.glass-pill:hover { transform: translateY(-1px); box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, var(--shadow-md); }
.glass-pill:active { transform: translateY(0); }
.glass-pill.is-active {
  background: rgba(20, 30, 80, 0.85);
  color: #fff;
  border-color: rgba(255,255,255,0.2);
}

/* ============ LAYOUT ============ */
.page {
  position: relative; z-index: 1;
  max-width: 1180px;
  margin: 0 auto;
  padding: 28px 28px 120px;
}

/* Sticky nav */
.nav {
  position: sticky; top: 16px;
  z-index: 40;
  padding: 10px 14px 10px 20px;
  margin-bottom: 36px;
}
.nav-brand {
  display: flex; align-items: center; gap: 10px;
  font: 600 14px var(--font-sans);
  letter-spacing: -0.01em;
  white-space: nowrap;
  flex-shrink: 0;
}
.nav-links { flex-shrink: 1; min-width: 0; }
.nav-brand .dot {
  width: 22px; height: 22px; border-radius: 7px;
  background: linear-gradient(135deg, var(--accent), var(--accent-3));
  box-shadow: 0 2px 6px rgba(80,70,220,0.35), inset 0 1px 0 rgba(255,255,255,0.4);
}
.nav-links { display: flex; gap: 4px; }
.nav-link {
  padding: 7px 12px; border-radius: 999px;
  font: 500 13px var(--font-sans); color: var(--muted);
  text-decoration: none; cursor: pointer;
  transition: color 0.2s, background 0.2s;
}
.nav-link:hover { color: var(--ink); background: rgba(12,18,40,0.04); }
.nav-link.active { color: var(--ink); background: rgba(12,18,40,0.06); }

/* Module section common */
.module { margin-bottom: 56px; scroll-margin-top: 100px; }
.module-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 18px;
  padding: 0 4px;
}
.module-eyebrow {
  font: 500 11px/1 var(--font-mono);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted-2);
}
.module-title {
  margin: 6px 0 0;
  font: 400 40px/1.05 var(--font-display);
  letter-spacing: -0.02em;
  font-style: italic;
  font-variation-settings: "SOFT" 80;
}
.module-sub {
  font: 400 14px var(--font-sans);
  color: var(--muted);
  letter-spacing: -0.01em;
}

/* ============ HERO ============ */
.hero {
  padding: 36px;
  margin-bottom: 48px;
}
.hero-left .status {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px 6px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.55);
  border: 0.5px solid rgba(255,255,255,0.8);
  font: 500 12px var(--font-mono); color: var(--ink-2);
  letter-spacing: -0.01em;
}
.hero-left .status .pulse {
  width: 8px; height: 8px; border-radius: 50%;
  background: oklch(0.72 0.18 150);
  box-shadow: 0 0 0 0 oklch(0.72 0.18 150 / 0.6);
  animation: pulse 1.8s ease-out infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 oklch(0.72 0.18 150 / 0.5); }
  100% { box-shadow: 0 0 0 12px oklch(0.72 0.18 150 / 0); }
}
.hero h1 {
  margin: 18px 0 14px;
  font: 400 64px/1.0 var(--font-display);
  letter-spacing: -0.025em;
  font-variation-settings: "SOFT" 80, "WONK" 1;
}
.hero h1 .accent {
  background: linear-gradient(120deg, var(--accent) 0%, var(--accent-3) 50%, #b88a6a 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  font-style: italic;
  font-weight: 300;
  font-variation-settings: "SOFT" 100, "WONK" 1;
}
.hero p {
  margin: 0 0 22px;
  font: 400 17px/1.55 var(--font-sans);
  color: var(--ink-2);
  max-width: 54ch;
  letter-spacing: -0.01em;
  text-wrap: pretty;
}
.hero-meta {
  display: flex; flex-wrap: wrap; gap: 10px;
  font: 400 13px var(--font-mono); color: var(--muted);
}
.hero-meta span { display: inline-flex; align-items: center; gap: 6px; }
.hero-meta .kbd {
  padding: 2px 6px; border-radius: 6px;
  background: rgba(12,18,40,0.05);
  color: var(--ink-2);
}
.hero-actions { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; }

.hero-right {
  position: relative;
  aspect-ratio: 1; width: 100%;
}
.avatar-frame {
  position: relative; width: 100%; height: 100%;
  border-radius: 28px;
  overflow: hidden;
  background: #e8eaf0;
  box-shadow: var(--shadow-lg);
}
.avatar-photo {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
}
.avatar-frame::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 65%, rgba(20,30,80,0.12));
  pointer-events: none;
}
.avatar-tag {
  position: absolute; bottom: -14px; left: 50%;
  transform: translateX(-50%);
  padding: 8px 14px; border-radius: 999px;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(20px);
  border: 0.5px solid rgba(255,255,255,0.9);
  font: 500 12px var(--font-mono);
  box-shadow: var(--shadow-sm);
  white-space: nowrap;
}

/* ============ PROJECTS ============ */
.projects-grid { display: grid; gap: 20px; }
.project-card {
  padding: 0;
  overflow: hidden;
}
.project-body { padding: 32px 32px 28px; display: flex; flex-direction: column; }
.project-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font: 500 11px/1 var(--font-mono);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  padding: 5px 10px;
  background: oklch(0.95 0.04 265);
  border-radius: 999px;
  align-self: flex-start;
}
.project-card h3 {
  margin: 16px 0 8px;
  font: 400 34px/1.1 var(--font-display);
  letter-spacing: -0.02em;
  font-variation-settings: "SOFT" 60;
}
.project-card .project-desc {
  margin: 0 0 18px;
  font: 400 15px/1.55 var(--font-sans);
  color: var(--ink-2);
  letter-spacing: -0.005em;
  text-wrap: pretty;
}
.project-feats {
  list-style: none; padding: 0; margin: 0 0 22px;
  display: grid; gap: 8px;
}
.project-feats li {
  display: grid; grid-template-columns: 18px 1fr; gap: 10px;
  font: 400 13px/1.45 var(--font-sans);
  color: var(--ink-2);
}
.project-feats li::before {
  content: ""; width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); margin-top: 8px;
}
.project-tags {
  margin-top: auto;
  display: flex; flex-wrap: wrap; gap: 6px;
}
.tag {
  font: 500 11px var(--font-mono);
  padding: 4px 9px; border-radius: 6px;
  background: rgba(12,18,40,0.05); color: var(--ink-2);
}
/* Project visual */
.project-visual {
  position: relative;
  min-height: 340px;
  background:
    radial-gradient(60% 60% at 30% 20%, #f0d9b8, transparent 60%),
    radial-gradient(70% 70% at 85% 80%, #a9bedc, transparent 60%),
    linear-gradient(135deg, #e9dec5, #c6d2e8 60%, #dbe3ee);
  overflow: hidden;
  border-left: 0.5px solid rgba(255,255,255,0.9);
}
.project-visual::before {
  content: "";
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><filter id='b'><feTurbulence type='fractalNoise' baseFrequency='0.01 0.08' numOctaves='3' seed='3'/><feColorMatrix values='0 0 0 0 0.6  0 0 0 0 0.65  0 0 0 0 0.8  0 0 0 0.3 0'/></filter><rect width='100%' height='100%' filter='url(%23b)'/></svg>");
  mix-blend-mode: soft-light;
  opacity: 0.7;
  pointer-events: none;
}
.mock-chat {
  position: absolute; inset: 22px;
  display: flex; flex-direction: column; gap: 10px;
}
.mock-row {
  padding: 10px 14px;
  border-radius: 14px;
  font: 500 12px var(--font-sans);
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(14px);
  border: 0.5px solid rgba(255,255,255,0.8);
  box-shadow: 0 1px 2px rgba(12,18,40,0.04);
  max-width: 86%;
}
.mock-row.user { align-self: flex-end; background: rgba(20,30,80,0.9); color: #fff; border-color: rgba(255,255,255,0.1); }
.mock-row.ai { align-self: flex-start; }
.mock-chart {
  align-self: flex-start;
  padding: 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(14px);
  border: 0.5px solid rgba(255,255,255,0.8);
  box-shadow: 0 2px 8px rgba(12,18,40,0.06);
  width: 88%;
}
.mock-chart .bars {
  display: flex; align-items: flex-end; gap: 6px; height: 64px; margin-top: 8px;
}
.mock-chart .bars span {
  flex: 1; border-radius: 4px 4px 2px 2px;
  background: linear-gradient(180deg, var(--accent), var(--accent-3));
  opacity: 0.8;
}
.mock-chart .cap {
  font: 500 10px var(--font-mono); color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase;
}

/* ============ KNOWLEDGE ============ */
.knowledge-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.k-card {
  cursor: pointer;
  padding: 26px 24px 22px;
  display: flex; flex-direction: column;
  min-height: 280px;
  transition: transform 0.3s cubic-bezier(.2,.7,.2,1), box-shadow 0.3s;
}
.k-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, var(--shadow-lg);
}
.k-icon {
  width: 56px; height: 56px; border-radius: 16px;
  display: grid; place-items: center;
  background: linear-gradient(135deg, rgba(255,255,255,0.85), rgba(255,255,255,0.55));
  border: 0.5px solid rgba(255,255,255,0.9);
  box-shadow: 0 4px 16px rgba(80,90,180,0.18), inset 0 1px 0 rgba(255,255,255,0.9);
  margin-bottom: 16px;
}
.k-card h3 {
  margin: 0 0 8px;
  font: 400 26px/1.15 var(--font-display);
  letter-spacing: -0.015em;
  font-variation-settings: "SOFT" 60;
}
.k-card .k-desc {
  margin: 0 0 16px;
  font: 400 13.5px/1.5 var(--font-sans);
  color: var(--ink-2);
  text-wrap: pretty;
}
.k-meta {
  margin-top: auto;
  display: flex; align-items: center; justify-content: space-between;
  font: 500 11px var(--font-mono); color: var(--muted);
  letter-spacing: 0.06em; text-transform: uppercase;
}
.k-meta .open-arrow {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(20,30,80,0.08);
  display: grid; place-items: center;
  transition: background 0.2s, transform 0.2s;
}
.k-card:hover .open-arrow { background: var(--accent); color: white; transform: translateX(2px); }
.k-topics { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.k-topic {
  font: 500 10.5px var(--font-mono);
  padding: 3px 8px; border-radius: 6px;
  background: rgba(12,18,40,0.05); color: var(--muted);
  letter-spacing: -0.005em;
}

/* ============ DETAIL OVERLAY ============ */
.overlay-root {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(15, 20, 45, 0.25);
  backdrop-filter: blur(18px) saturate(1.2);
  -webkit-backdrop-filter: blur(18px) saturate(1.2);
  display: flex; justify-content: center; align-items: flex-start;
  overflow-y: auto;
  padding: 40px 24px;
  animation: overlayIn 0.35s cubic-bezier(.2,.7,.2,1);
}
@keyframes overlayIn { from { opacity: 0; backdrop-filter: blur(0); } to { opacity: 1; } }

.detail {
  position: relative;
  width: 100%; max-width: 1040px;
  padding: 0;
  animation: detailIn 0.4s cubic-bezier(.2,.7,.2,1);
}
@keyframes detailIn {
  from { opacity: 0; transform: translateY(20px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.detail-close {
  position: absolute; top: 16px; right: 16px; z-index: 5;
  width: 36px; height: 36px; border-radius: 50%;
  display: grid; place-items: center;
  border: none; cursor: pointer;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(14px);
  border: 0.5px solid rgba(255,255,255,0.9);
  box-shadow: var(--shadow-sm);
  transition: transform 0.2s, background 0.2s;
}
.detail-close:hover { transform: rotate(90deg); background: rgba(255,255,255,0.9); }
.detail-header {
  padding: 36px 40px 24px;
  border-bottom: 0.5px solid rgba(12,18,40,0.08);
}
.detail-header .eyebrow {
  font: 500 11px var(--font-mono); letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--accent);
}
.detail-header h2 {
  margin: 10px 0 8px;
  font: 400 42px/1.05 var(--font-display);
  letter-spacing: -0.02em;
  font-style: italic;
  font-variation-settings: "SOFT" 80;
}
.detail-header p {
  margin: 0;
  font: 400 15px/1.55 var(--font-sans);
  color: var(--ink-2);
  max-width: 64ch;
}

/* Step layout */
.detail-body {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 520px;
}
.step-rail {
  border-right: 0.5px solid rgba(12,18,40,0.08);
  padding: 24px 16px;
  display: flex; flex-direction: column; gap: 2px;
}
.step-item {
  display: grid; grid-template-columns: 28px 1fr; gap: 10px;
  align-items: flex-start;
  padding: 10px 12px;
  border: none; background: none; text-align: left;
  border-radius: 10px; cursor: pointer;
  font: 500 13px var(--font-sans);
  color: var(--muted);
  letter-spacing: -0.005em;
  transition: background 0.2s, color 0.2s;
}
.step-item:hover { background: rgba(12,18,40,0.04); color: var(--ink); }
.step-item.active {
  background: rgba(20,30,80,0.06);
  color: var(--ink);
}
.step-item .num {
  width: 24px; height: 24px; border-radius: 50%;
  display: grid; place-items: center;
  font: 500 11px var(--font-mono);
  background: rgba(12,18,40,0.06);
  color: var(--muted);
  margin-top: 1px;
}
.step-item.active .num,
.step-item.done .num {
  background: var(--accent); color: white;
}
.step-item .tick { font: 500 11px var(--font-mono); }

.step-stage {
  padding: 32px 40px 40px;
  display: flex; flex-direction: column;
}
.step-label {
  font: 500 11px var(--font-mono); letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted-2);
}
.step-stage h3 {
  margin: 6px 0 10px;
  font: 400 28px/1.15 var(--font-display);
  letter-spacing: -0.015em;
  font-variation-settings: "SOFT" 60;
}
.step-stage p.lede {
  margin: 0 0 22px;
  font: 400 14.5px/1.6 var(--font-sans);
  color: var(--ink-2);
  max-width: 62ch;
  text-wrap: pretty;
}
.step-diagram {
  border-radius: 18px;
  background: rgba(255,255,255,0.5);
  border: 0.5px solid rgba(255,255,255,0.85);
  padding: 24px;
  margin-bottom: 18px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 2px 6px rgba(12,18,40,0.04);
}
.step-notes {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  margin-bottom: 20px;
}
.note {
  padding: 14px 16px;
  border-radius: 14px;
  background: rgba(255,255,255,0.55);
  border: 0.5px solid rgba(255,255,255,0.85);
}

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>
// Animated background — Impression, Sunrise after Monet
// Blue-grey mist dominant, vivid orange sun upper-right,
// hazy background ships left side, two foreground rowboats,
// shimmering orange reflection, horizontal brushstroke water.

(function () {
  const GW = 200, GH = 120;
  const HORIZON = 54; // row where sky meets water
  const SUN_X = 130, SUN_Y = 30, SUN_R = 5;

  let canvas, ctx, offscreen, octx, t = 0;

  // ── Palette ───────────────────────────────────────────────────────────────
  const C = {
    // Sky — cold blue-grey mist base
    skyBase:   [168, 182, 196],
    skyMid:    [158, 172, 188],
    skyDark:   [138, 154, 172],
    skyWarm:   [210, 176, 148], // near sun
    skyWarm2:  [188, 152, 118],
    skyStroke: [144, 160, 178],
    // Water
    waterBase: [128, 148, 166],
    waterDark: [108, 128, 148],
    waterMid:  [118, 138, 158],
    waterLight:[152, 170, 184],
    waterDash: [136, 154, 170],
    // Sun
    sun:       [255, 52, 20],
    sunHalo:   [240, 110, 60],
    sunHalo2:  [220, 148, 90],
    // Reflection
    refl1:     [230, 100, 40],
    refl2:     [200, 72, 28],
    refl3:     [165, 50, 20],
    refl4:     [130, 40, 16],
    // Background ships — very muted blue-grey
    shipFar:   [118, 136, 154],  // almost sky
    shipMid:   [98,  116, 136],
    shipNear:  [78,  96,  118],
    // Boats
    boat1:     [24,  30,  44],   // near foreground — dark navy
    boat2:     [56,  72,  92],   // far boat — bluer/lighter
    boat2f:    [72,  88, 108],   // far boat lighter variant
  };

  function px(pixels, x, y, col, alpha=1) {
    if (x<0||x>=GW||y<0||y>=GH) return;
    const i=(y*GW+x)*3;
    pixels[i]   = (pixels[i]  *(1-alpha) + col[0]*alpha)|0;
    pixels[i+1] = (pixels[i+1]*(1-alpha) + col[1]*alpha)|0;
    pixels[i+2] = (pixels[i+2]*(1-alpha) + col[2]*alpha)|0;
  }

  // Paint a blurry "blob" — impressionist far element
  // The larger the blur radius, the more it dissolves into background
  function blob(pixels, cx, cy, w, h, col, alpha, blur=1) {
    for (let dy=-h;dy<=h;dy++) for (let dx=-w;dx<=w;dx++) {
      const dist = Math.sqrt((dx/w)*(dx/w)+(dy/h)*(dy/h));
      if (dist > 1) continue;
      const a = alpha * (1 - Math.pow(dist, blur));
      px(pixels, cx+dx, cy+dy, col, a);
    }
  }

  // Smear a vertical line upward with decreasing alpha (mast/crane)
  function smearMast(pixels, x, baseY, height, col, alpha, blur=1.5) {
    for (let dy=0;dy<height;dy++) {
      const a = alpha * Math.pow(1 - dy/height, blur);
      // slight horizontal smear for impressionist feel
      px(pixels, x,   baseY-dy, col, a);
      if (dy % 2 === 0) px(pixels, x-1, baseY-dy, col, a*0.4);
      if (dy % 3 === 0) px(pixels, x+1, baseY-dy, col, a*0.35);
    }
  }

  // ── Sky ───────────────────────────────────────────────────────────────────
  function drawSky(pixels) {
    for (let y=0;y<HORIZON;y++) {
      const f = y/HORIZON; // 0=top, 1=horizon
      for (let x=0;x<GW;x++) {
        // Warm zone near sun — radial gradient
        const dx = x - SUN_X, dy = y - SUN_Y;
        const distSun = Math.sqrt(dx*dx*0.7 + dy*dy);
        const warmth = Math.max(0, 1 - distSun/52);
        // base sky
        const base = [C.skyBase[0]*(1-f)+C.skyDark[0]*f,
                      C.skyBase[1]*(1-f)+C.skyDark[1]*f,
                      C.skyBase[2]*(1-f)+C.skyDark[2]*f];
        // mix in warm
        const c = [
          base[0]*(1-warmth) + C.skyWarm[0]*warmth,
          base[1]*(1-warmth) + C.skyWarm[1]*warmth,
          base[2]*(1-warmth) + C.skyWarm[2]*warmth,
        ];
        px(pixels, x, y, c, 1);
      }
    }

    // Impressionist sky brushstrokes — short horizontal dashes of varying tone
    for (let i=0;i<320;i++) {
      const x = (Math.random()*GW)|0;
      const y = (Math.random()*(HORIZON-4))|0;
      const len = 3 + (Math.random()*6)|0;
      const warm = Math.abs(x-SUN_X) < 30 && Math.abs(y-SUN_Y) < 20;
      const stroke = warm ? C.skyWarm2 : C.skyStroke;
      for (let dx=0;dx<len;dx++) px(pixels, x+dx, y, stroke, 0.18 + Math.random()*0.12);
    }
  }

  // ── Sun ───────────────────────────────────────────────────────────────────
  function drawSun(pixels) {
    // Soft halo
    for (let dy=-12;dy<=12;dy++) for (let dx=-12;dx<=12;dx++) {
      const d = Math.sqrt(dx*dx+dy*dy);
      if (d > 12) continue;
      const a = Math.max(0, 0.28 - d/44);
      px(pixels, SUN_X+dx, SUN_Y+dy, C.sunHalo2, a);
    }
    for (let dy=-8;dy<=8;dy++) for (let dx=-8;dx<=8;dx++) {
      const d = Math.sqrt(dx*dx+dy*dy);
      if (d > 8) continue;
      const a = Math.max(0, 0.45 - d/18);
      px(pixels, SUN_X+dx, SUN_Y+dy, C.sunHalo, a);
    }
    // Disc
    for (let dy=-SUN_R;dy<=SUN_R;dy++) for (let dx=-SUN_R;dx<=SUN_R;dx++) {
      if (dx*dx+dy*dy<=SUN_R*SUN_R) px(pixels, SUN_X+dx, SUN_Y+dy, C.sun, 0.97);
    }
  }

  // ── Background ships — LEFT heavy, RIGHT lighter, very hazy ──────────────
  function drawBgShips(pixels) {
    // LEFT cluster — large industrial cranes/masts, very hazy
    // Main hull left
    blob(pixels, 22, HORIZON-4, 22, 6, C.shipFar, 0.45, 1.8);
    blob(pixels, 32, HORIZON-6, 16, 5, C.shipMid, 0.35, 2.0);
    // Left masts (tall, very blurred)
    smearMast(pixels, 14, HORIZON-8, 32, C.shipFar, 0.38, 2.2);
    smearMast(pixels, 22, HORIZON-8, 40, C.shipMid, 0.42, 2.0);
    smearMast(pixels, 32, HORIZON-8, 36, C.shipFar, 0.36, 2.4);
    smearMast(pixels, 42, HORIZON-8, 28, C.shipFar, 0.30, 2.5);
    // Cross-beams — hazy horizontals
    for (let dx=-10;dx<=10;dx++) {
      px(pixels, 22+dx, HORIZON-26, C.shipMid, 0.25);
      px(pixels, 32+dx, HORIZON-20, C.shipFar, 0.20);
    }
    // Second left cluster
    blob(pixels, 55, HORIZON-3, 12, 4, C.shipFar, 0.30, 2.0);
    smearMast(pixels, 52, HORIZON-6, 22, C.shipFar, 0.28, 2.5);
    smearMast(pixels, 58, HORIZON-6, 28, C.shipFar, 0.25, 2.8);

    // RIGHT cluster — lighter, more distant
    blob(pixels, 158, HORIZON-3, 16, 5, C.shipFar, 0.28, 2.2);
    blob(pixels, 172, HORIZON-3, 12, 4, C.shipFar, 0.22, 2.5);
    smearMast(pixels, 155, HORIZON-6, 18, C.shipFar, 0.22, 2.8);
    smearMast(pixels, 163, HORIZON-6, 24, C.shipFar, 0.24, 2.5);
    smearMast(pixels, 174, HORIZON-6, 16, C.shipFar, 0.18, 3.0);
    // Right horizontal arm
    for (let dx=-6;dx<=6;dx++) px(pixels, 163+dx, HORIZON-18, C.shipFar, 0.16);
  }

  // ── Water — horizontal brushstroke dashes ─────────────────────────────────
  function drawWater(pixels, t) {
    for (let y=HORIZON;y<GH;y++) {
      const depth = (y-HORIZON)/(GH-HORIZON);
      // base water — slight gradient, darker near horizon
      const base = [
        C.waterBase[0]*(1-depth*0.15),
        C.waterBase[1]*(1-depth*0.12),
        C.waterBase[2]*(1-depth*0.10),
      ];
      for (let x=0;x<GW;x++) {
        px(pixels, x, y, base, 1);
      }
    }

    // Horizontal brushstroke dashes — the Monet water texture
    // Each row has short dashes of varying tone; they shift slightly with time
    for (let y=HORIZON;y<GH;y++) {
      const depth = (y-HORIZON)/(GH-HORIZON);
      const speed = 0.18 + depth*0.55; // near rows move faster
      const dashLen = 2 + (depth*3)|0;

      // Multiple passes of dashes at different phases
      for (let pass=0;pass<3;pass++) {
        const phase = pass * 2.2 + t * speed + depth * 4.5;
        const spacing = 5 + (pass*3)|0;
        let x = ((phase * 13.7) % spacing)|0;
        while (x < GW) {
          const len = dashLen + ((Math.sin(x*0.7+pass)*1.5)|0);
          const pick = pass===0 ? C.waterDark : pass===1 ? C.waterLight : C.waterDash;
          for (let dx=0;dx<len;dx++) px(pixels, x+dx, y, pick, 0.28+pass*0.06);
          x += spacing + ((Math.sin(x*0.3+y*0.1)*2)|0);
        }
      }
    }

    // Orange reflection — zigzag column below sun, widens toward viewer
    for (let y=HORIZON;y<GH;y++) {
      const depth = (y-HORIZON)/(GH-HORIZON);
      const reflW = 1.5 + depth * 9;
      // wiggle side to side with wave motion
      const wobble = Math.sin(t * 1.4 + depth * 6) * 2.2
                   + Math.sin(t * 0.8 + depth * 3.5 + 1.1) * 1.4;
      const cx = SUN_X + wobble;

      for (let dx=-reflW;dx<=reflW;dx++) {
        const dist = Math.abs(dx);
        const ripple = Math.sin(t * 2.2 + depth * 7 + dx * 0.5) * 0.5 + 0.5;
        const alpha = (1 - dist/reflW) * (0.55 + ripple * 0.35) * (0.5 + depth * 0.55);
        const col = depth < 0.3 ? C.refl1 : depth < 0.55 ? C.refl2 : depth < 0.78 ? C.refl3 : C.refl4;
        px(pixels, (cx+dx)|0, y, col, alpha);
      }
    }

    // Horizon haze — soft blend line
    for (let x=0;x<GW;x++) {
      px(pixels, x, HORIZON,   C.skyBase, 0.55);
      px(pixels, x, HORIZON+1, C.skyBase, 0.28);
    }
  }

  // ── Far small boat — left center, blurry ─────────────────────────────────
  function drawFarBoat(pixels, t) {
    const bob = Math.sin(t*0.72 + 1.1)*0.8;
    const bx = 38, by = (HORIZON + 9 + bob)|0;
    // Blurry — paint as soft blob
    blob(pixels, bx+4, by, 7, 2, C.boat2, 0.55, 1.6);
    blob(pixels, bx+4, by-1, 5, 1, C.boat2, 0.45, 1.8);
    // Hazy figure
    blob(pixels, bx+4, by-4, 2, 3, C.boat2, 0.40, 2.0);
    // Soft oar stroke
    for (let dx=-4;dx<=6;dx++) px(pixels, bx+4+dx, by-2, C.boat2f, 0.22);
  }

  // ── Near foreground boat — dark, defined, two figures ─────────────────────
  function drawNearBoat(pixels, t) {
    const bob = Math.sin(t*0.88)*1.1 + Math.sin(t*0.55)*0.5;
    const bx = 86, by = (HORIZON + 22 + bob)|0;

    // Hull — solid dark pixels, slight taper
    for (let dx=0;dx<18;dx++) {
      const taper = dx===0||dx===17 ? 1 : dx<2||dx>15 ? 0 : -1;
      for (let dy=0;dy<3;dy++) {
        if (dy===2 && (dx<2||dx>15)) continue;
        px(pixels, bx+dx, by+dy+taper, C.boat1, 0.97);
      }
    }
    // Deck
    for (let dx=2;dx<16;dx++) px(pixels, bx+dx, by-1, C.boat1, 0.92);

    // Figure 1 (left — oarsman, slightly leaning)
    for (let dy=-5;dy<=-1;dy++) px(pixels, bx+5, by+dy, C.boat1, 0.95);
    for (let dy=-6;dy<=-5;dy++) px(pixels, bx+6, by+dy, C.boat1, 0.85); // lean
    px(pixels, bx+5, by-7, C.boat1, 0.92); // head
    px(pixels, bx+6, by-7, C.boat1, 0.72);
    // Oar (sweeping)
    for (let dx=-5;dx<=8;dx++) px(pixels, bx+5+dx, by-3+(dx<0?1:0), C.boat1, 0.70);

    // Figure 2 (right — standing/seated taller)
    for (let dy=-7;dy<=-1;dy++) px(pixels, bx+11, by+dy, C.boat1, 0.97);
    for (let dy=-7;dy<=-6;dy++) px(pixels, bx+12, by+dy, C.boat1, 0.75);
    px(pixels, bx+11, by-8, C.boat1, 0.90); // head
    // Slight shoulder width
    px(pixels, bx+10, by-6, C.boat1, 0.65);
    px(pixels, bx+12, by-6, C.boat1, 0.55);

    // Reflection of boat (dark wavering smear below)
    for (let dx=1;dx<17;dx++) {
      const skip = Math.sin(t*2.4+dx*0.45) > 0.4;
      if (!skip) continue;
      const ry = by+3 + ((Math.sin(t*1.9+dx*0.55)*1.8)|0);
      px(pixels, bx+dx, ry, C.boat1, 0.32);
    }
    // Figure reflections
    for (let dy=0;dy<5;dy++) {
      px(pixels, bx+5,  by+3+dy, C.boat1, 0.20*(1-dy/5));
      px(pixels, bx+11, by+3+dy, C.boat1, 0.22*(1-dy/5));
    }
  }

  // ── Frame ─────────────────────────────────────────────────────────────────
  function frame() {
    t += 0.016;

    const imgd = octx.createImageData(GW, GH);
    const d = imgd.data;
    const pixels = new Uint8Array(GW * GH * 3);

    drawSky(pixels);
    drawSun(pixels);
    drawBgShips(pixels);
    drawWater(pixels, t);
    drawFarBoat(pixels, t);
    drawNearBoat(pixels, t);

    for (let i=0;i<GW*GH;i++) {
      d[i*4]=pixels[i*3]; d[i*4+1]=pixels[i*3+1];
      d[i*4+2]=pixels[i*3+2]; d[i*4+3]=255;
    }
    octx.putImageData(imgd, 0, 0);

    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(offscreen, 0, 0, canvas.width, canvas.height);

    requestAnimationFrame(frame);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  window.initBgCanvas = function () {
    canvas = document.getElementById('bg-canvas');
    if (!canvas) return;
    ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    offscreen = document.createElement('canvas');
    offscreen.width = GW; offscreen.height = GH;
    octx = offscreen.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    requestAnimationFrame(frame);
  };
})();
</script>
<script type="text/babel">
// Liquid glass primitives — layered backdrop-filter + specular highlight + chromatic edge.
// Kept as simple components so every module shares the same treatment.

const GlassSurface = ({ children, className = "", style = {}, radius = 28, intensity = "medium", onClick, as: Tag = "div", ...rest }) => {
  const blur = intensity === "heavy" ? 32 : intensity === "subtle" ? 10 : 20;
  const sat = intensity === "heavy" ? 1.9 : intensity === "subtle" ? 1.25 : 1.6;
  return (
    <Tag
      onClick={onClick}
      className={`glass-surface ${className}`}
      style={{
        borderRadius: radius,
        backdropFilter: `blur(${blur}px) saturate(${sat})`,
        WebkitBackdropFilter: `blur(${blur}px) saturate(${sat})`,
        ...style,
      }}
      {...rest}
    >
      {/* Inner specular highlight + edge refraction */}
      <span className="glass-edge" aria-hidden="true" style={{ borderRadius: radius }} />
      <span className="glass-spec" aria-hidden="true" style={{ borderRadius: radius }} />
      <span className="glass-tint" aria-hidden="true" style={{ borderRadius: radius }} />
      <span className="glass-content">{children}</span>
    </Tag>
  );
};

const GlassPill = ({ children, className = "", style = {}, onClick, active = false }) => (
  <button
    onClick={onClick}
    className={`glass-pill ${active ? "is-active" : ""} ${className}`}
    style={style}
  >
    <span className="glass-edge" aria-hidden="true" style={{ borderRadius: 999 }} />
    <span className="glass-spec" aria-hidden="true" style={{ borderRadius: 999 }} />
    <span className="glass-tint" aria-hidden="true" style={{ borderRadius: 999 }} />
    <span className="glass-content">{children}</span>
  </button>
);

const Background = () => {
  React.useEffect(() => {
    if (window.initBgCanvas) window.initBgCanvas();
  }, []);
  return (
    <canvas
      id="bg-canvas"
      aria-hidden="true"
      style={{
        position: "fixed", inset: 0, zIndex: 0,
        width: "100vw", height: "100vh",
        display: "block", pointerEvents: "none",
        imageRendering: "pixelated",
      }}
    />
  );
};

Object.assign(window, { GlassSurface, GlassPill, Background });

// Interactive step-by-step walkthroughs for the three knowledge topics.
// Each topic has: id, title, summary, topics[], icon, steps[] (each step has
// a title, lede, a diagram component, and 2 notes).

// ---------- Shared diagram primitives ----------
const Box = ({ x, y, w, h, label, sub, fill = "rgba(255,255,255,0.9)", stroke = "rgba(12,18,40,0.18)", dashed = false, accent = false }) => (
  <g>
    <rect
      x={x} y={y} width={w} height={h} rx="10"
      fill={accent ? "oklch(0.58 0.18 265)" : fill}
      stroke={stroke}
      strokeWidth="1"
      strokeDasharray={dashed ? "4 4" : undefined}
    />
    <text x={x + w / 2} y={y + (sub ? h / 2 - 4 : h / 2 + 4)} textAnchor="middle"
      fontSize="12" fontWeight="600" fontFamily="Inter, system-ui"
      fill={accent ? "white" : "#0b1020"}>
      {label}
    </text>
    {sub && (
      <text x={x + w / 2} y={y + h / 2 + 12} textAnchor="middle"
        fontSize="10" fontFamily="JetBrains Mono, monospace"
        fill={accent ? "rgba(255,255,255,0.8)" : "#5b6478"}>
        {sub}
      </text>
    )}
  </g>
);

const Arrow = ({ x1, y1, x2, y2, label, dashed = false, color = "#5b6478" }) => {
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  return (
    <g>
      <defs>
        <marker id={`arr-${color.replace(/[^a-z0-9]/gi, "")}`} markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
          <path d="M0,0 L8,4 L0,8 z" fill={color} />
        </marker>
      </defs>

      {window.KNOWLEDGE.map((k) => (
        <GlassSurface key={k.id} className="k-card" radius={24} onClick={() => onOpen(k.id)}>
          <div className="k-icon">{k.icon}</div>
          <h3>{k.title}</h3>
          <p className="k-desc">{k.summary}</p>
          <div className="k-topics">
            {k.topics.map((t) => <span key={t} className="k-topic">{t}</span>)}
          </div>
          <div className="k-meta">
            <span>{k.steps.length} steps · {k.depth}</span>
            <span className="open-arrow">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </span>
          </div>
        </GlassSurface>
      ))}
    </div>
  </section>
);

// ---------- Detail overlay ----------
const KnowledgeDetail = ({ topic, onClose }) => {
  const [idx, setIdx] = useState(0);
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") onClose();
      if (e.key === "ArrowRight") setIdx((i) => Math.min(i + 1, topic.steps.length - 1));
      if (e.key === "ArrowLeft") setIdx((i) => Math.max(i - 1, 0));
    };
    window.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => {
      window.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";
    };
  }, [topic, onClose]);

  const step = topic.steps[idx];
  const Diagram = step.Diagram;

  return (
    <div className="overlay-root" onClick={(e) => e.target.classList.contains("overlay-root") && onClose()}>
      <GlassSurface className="detail" radius={28}>
        <button className="detail-close" onClick={onClose} aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
          </svg>
        </button>
        <div className="detail-header">
          <div className="eyebrow">{topic.short} · knowledge walkthrough</div>
          <h2>{topic.title}</h2>
          <p>{topic.summary}</p>
        </div>
        <div className="detail-body">
          <div className="step-rail">
            {topic.steps.map((s, i) => (
              <button key={i} className={`step-item ${i === idx ? "active" : ""} ${i < idx ? "done" : ""}`} onClick={() => setIdx(i)}>
                <span className="num">{i < idx ? "✓" : i + 1}</span>
                <span>{s.title}</span>
              </button>
            ))}
          </div>
          <div className="step-stage">
            <div className="step-label">Step {idx + 1} of {topic.steps.length}</div>
            <h3>{step.title}</h3>
            <p className="lede">{step.lede}</p>
            <div className="step-diagram"><Diagram /></div>
            <div className="step-notes">
              {step.notes.map((n, i) => (
                <div key={i} className="note">
                  <h4>{n.h}</h4>
                  <p>{n.b}</p>
                </div>
              ))}
            </div>
            <div className="step-nav">
              <GlassPill onClick={() => setIdx(Math.max(0, idx - 1))}>← prev</GlassPill>
              <span className="counter">{String(idx + 1).padStart(2, "0")} / {String(topic.steps.length).padStart(2, "0")}</span>
              <GlassPill active={idx < topic.steps.length - 1} onClick={() =>
                idx < topic.steps.length - 1 ? setIdx(idx + 1) : onClose()
              }>
                {idx < topic.steps.length - 1 ? "next →" : "done ✓"}
              </GlassPill>
            </div>
          </div>
        </div>
      </GlassSurface>
    </div>
  );
};

// ---------- Tweaks panel ----------
const TweaksPanel = ({ visible, tweaks, setTweaks }) => {
  if (!visible) return null;
  return (
    <GlassSurface className="tweaks" radius={20}>
      <h4>Tweaks</h4>
      <div className="tweak-row">
        <label>Glass</label>
        <div className="tweak-chips">
          {["subtle", "medium", "heavy"].map((v) => (
            <button key={v} className={`tweak-chip ${tweaks.glass === v ? "active" : ""}`}
              onClick={() => setTweaks({ ...tweaks, glass: v })}>{v}</button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <label>Accent</label>
        <div className="tweak-chips">
          {[
            { id: "indigo", h: 265 },
            { id: "violet", h: 300 },
            { id: "ocean", h: 230 },
            { id: "mint", h: 165 },
          ].map((c) => (
            <div key={c.id}
              className={`tweak-swatch ${tweaks.accent === c.id ? "active" : ""}`}
              title={c.id}
              style={{ background: `oklch(0.58 0.18 ${c.h})` }}
              onClick={() => setTweaks({ ...tweaks, accent: c.id })}
            />
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <label>Background</label>
        <div className="tweak-chips">
          {["warm", "cool", "iridescent"].map((v) => (
            <button key={v} className={`tweak-chip ${tweaks.bg === v ? "active" : ""}`}
              onClick={() => setTweaks({ ...tweaks, bg: v })}>{v}</button>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <label>Density</label>
        <div className="tweak-chips">
          {["comfy", "tight"].map((v) => (
            <button key={v} className={`tweak-chip ${tweaks.density === v ? "active" : ""}`}
              onClick={() => setTweaks({ ...tweaks, density: v })}>{v}</button>
          ))}
        </div>
      </div>
    </GlassSurface>
  );
};

// ---------- App ----------
const App = () => {
  const [openId, setOpenId] = useState(null);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [tweaks, setTweaks] = useState(window.__TWEAKS__ || {
    glass: "medium", accent: "indigo", bg: "warm", density: "comfy",
  });

  // Apply tweaks
  useEffect(() => {
    const hueMap = { indigo: 265, violet: 300, ocean: 230, mint: 165 };
    const root = document.documentElement;
    const h = hueMap[tweaks.accent] || 265;
    root.style.setProperty("--accent", `oklch(0.58 0.18 ${h})`);
    root.style.setProperty("--accent-2", `oklch(0.65 0.15 ${h - 20})`);
    root.style.setProperty("--accent-3", `oklch(0.72 0.14 ${h + 35})`);
    document.body.dataset.bg = tweaks.bg;
    document.body.dataset.density = tweaks.density;
    // persist
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: tweaks }, "*");
  }, [tweaks]);

  // Edit-mode protocol
  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweaksVisible(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksVisible(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const openTopic = window.KNOWLEDGE.find((k) => k.id === openId);

  return (
    <React.Fragment>
      <Background />
      <div className="page">
        <GlassSurface className="nav" radius={999}>
          <div className="nav-brand">
            <span className="dot" />
            <span>portfolio · v2026</span>
          </div>
          <div className="nav-links">
            <a className="nav-link active" href="#about">about</a>
            <a className="nav-link" href="#projects">projects</a>
            <a className="nav-link" href="#knowledge">knowledge</a>
            <a className="nav-link" href="#contact">contact</a>
          </div>
        </GlassSurface>

        <div id="about">
          <Hero
            name="Shibo Zhang"
            role="Full Stack Engineer - AI/data"
            bio="I design and build human-in-the-loop AI products — interfaces that make language models useful to people who don't speak SQL. Mostly React on the front and Python on the back; always with a pen nearby."
            location="Bay Area CA · PST"
            handle="@Shibo Zhang"
          />
        </div>

        <section className="module" id="contact" style={{ marginTop: -8, marginBottom: 56 }}>
          <GlassSurface radius={24} style={{ padding: "20px 24px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 20, flexWrap: "wrap" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                <span style={{ font: "500 11px/1 var(--font-mono)", letterSpacing: "0.12em", textTransform: "uppercase", color: "var(--muted-2)" }}>Get in touch</span>
                <span style={{ width: 1, height: 16, background: "rgba(12,18,40,0.12)" }} />
                <span style={{ font: "400 14px var(--font-sans)", color: "var(--ink-2)" }}>Open to collaborations</span>
              </div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                <a href="mailto:hello@yourname.dev" style={{ textDecoration: "none" }}>
                  <GlassPill>✉ shibozhang0808@gmail.com</GlassPill>
                </a>
                <a href="https://github.com/Samberg-0808" target="_blank" rel="noopener noreferrer" style={{ textDecoration: "none" }}>
                  <GlassPill>↗ github</GlassPill>
                </a>
                <a href="https://www.linkedin.com/in/shibo-zhang-a99373203/" target="_blank" rel="noopener noreferrer" style={{ textDecoration: "none" }}>
                  <GlassPill>↗ linkedin</GlassPill>
                </a>
              </div>
            </div>
          </GlassSurface>
        </section>

        <Projects />
        <KnowledgeGrid onOpen={setOpenId} />

        <footer style={{ textAlign: "center", font: "500 12px var(--font-mono)", color: "var(--muted-2)", marginTop: 40, letterSpacing: "0.06em" }}>
          hand-crafted · glass v26 · {new Date().getFullYear()}
        </footer>
      </div>

      {openTopic && <KnowledgeDetail topic={openTopic} onClose={() => setOpenId(null)} />}

      <TweaksPanel visible={tweaksVisible} tweaks={tweaks} setTweaks={setTweaks} />
    </React.Fragment>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
